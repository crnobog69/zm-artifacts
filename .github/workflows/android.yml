name: Build Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - app-bundle

permissions:
  contents: write

jobs:
  build:
    name: Build Android (${{ github.event.inputs.build_type || 'apk' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java (for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cache node_modules — keyed on bun.lockb
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lockb') }}
          restore-keys: node-modules-

      # Cache Gradle home (downloaded jars, wrapper, metadata)
      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-home-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-home-

      # Cache Gradle build outputs (incremental compilation)
      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: android/.gradle
          key: gradle-build-${{ github.sha }}
          restore-keys: gradle-build-

      # Cache NDK and Android SDK packages installed at runtime
      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ hashFiles('**/*.gradle*') }}
          restore-keys: android-sdk-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # --- Option A: Build with EAS (cloud) ---
      # Uncomment this block and comment out Option B to use EAS Build
      # - name: Build with EAS
      #   run: |
      #     if [ "${{ github.event.inputs.build_type }}" = "app-bundle" ]; then
      #       eas build --platform android --profile production --non-interactive
      #     else
      #       eas build --platform android --profile preview --non-interactive
      #     fi

      # --- Option B: Build locally on GitHub Actions runner ---
      - name: Generate native Android project
        run: bunx expo prebuild --platform android --clean

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build release APK
        if: github.event.inputs.build_type != 'app-bundle'
        working-directory: android
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"
        run: |
          if [ -f app/release.keystore ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
              -Pandroid.injected.signing.store.password="$RELEASE_STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$RELEASE_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$RELEASE_KEY_PASSWORD"
          else
            echo "::warning::No keystore found — building unsigned APK"
            ./gradlew assembleRelease
          fi

      - name: Build release AAB (app-bundle)
        if: github.event.inputs.build_type == 'app-bundle'
        working-directory: android
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"
        run: |
          if [ -f app/release.keystore ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
              -Pandroid.injected.signing.store.password="$RELEASE_STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$RELEASE_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$RELEASE_KEY_PASSWORD"
          else
            echo "::warning::No keystore found — building unsigned AAB"
            ./gradlew bundleRelease
          fi

      - name: Upload APK artifact
        if: github.event.inputs.build_type != 'app-bundle'
        uses: actions/upload-artifact@v4
        with:
          name: zlikord-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: github.event.inputs.build_type == 'app-bundle'
        uses: actions/upload-artifact@v4
        with:
          name: zlikord-android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
